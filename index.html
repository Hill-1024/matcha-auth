<!DOCTYPE html>
<html lang="zh-CN" class="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Matcha 令牌</title>
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <script>
    (function() {
      try {
        // 1. Apply Dark Mode
        var themeMode = localStorage.getItem('matcha_theme_mode') || 'system';
        var isDark = false;
        if (themeMode === 'dark') {
          isDark = true;
        } else if (themeMode === 'system') {
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }

        // 2. Apply Cached Theme CSS Variables
        var cachedCss = localStorage.getItem('matcha_cached_theme_css');
        if (cachedCss) {
          document.documentElement.style.cssText = cachedCss;
        }
      } catch (e) {
        console.error('Error applying initial theme:', e);
      }
    })();
  </script>
</head>
<body class="bg-background text-on-background font-display antialiased selection:bg-primary-container selection:text-primary preload">
<div id="root"></div>
<script type="module" src="/index.tsx"></script>
</body>
</html>
