name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag. Leave empty to use v{package.json version}.'
        required: false
        type: string
      draft:
        description: 'Create the GitHub Release as a draft.'
        required: false
        default: false
        type: boolean
      prerelease:
        description: 'Mark the GitHub Release as a prerelease.'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name || inputs.tag || github.run_id }}
  cancel-in-progress: false

jobs:
  release:
    name: Build Android and Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 21

      - name: Install dependencies
        run: npm ci

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./package.json').version")"
          APP_NAME="$(node -p "require('./package.json').name")"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" && -n "${{ inputs.tag }}" ]]; then
            RELEASE_TAG="${{ inputs.tag }}"
          elif [[ "${{ github.ref_type }}" == "tag" ]]; then
            RELEASE_TAG="${{ github.ref_name }}"
          else
            RELEASE_TAG="v${APP_VERSION}"
          fi

          if [[ "${RELEASE_TAG}" != v* ]]; then
            RELEASE_TAG="v${RELEASE_TAG}"
          fi

          if [[ "${RELEASE_TAG#v}" != "${APP_VERSION}" ]]; then
            echo "::warning title=Version mismatch::Release tag ${RELEASE_TAG} does not match package.json version ${APP_VERSION}."
          fi

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            DRAFT="${{ inputs.draft }}"
            PRERELEASE="${{ inputs.prerelease }}"
          else
            DRAFT="false"
            if [[ "${RELEASE_TAG}" == *-* ]]; then
              PRERELEASE="true"
            else
              PRERELEASE="false"
            fi
          fi

          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${DRAFT}" >> "$GITHUB_OUTPUT"
          echo "prerelease=${PRERELEASE}" >> "$GITHUB_OUTPUT"

      - name: Build web assets
        run: |
          npm run generate-info
          npx tsc --noEmit
          npx vite build

      - name: Prepare Capacitor Android project
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi
          npx capacitor-assets generate --android
          node update-version.js
          npx cap sync android

      - name: Build Android release artifacts
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew --no-daemon clean assembleRelease bundleRelease

      - name: Collect release artifacts
        shell: bash
        run: |
          RELEASE_TAG="${{ steps.meta.outputs.release_tag }}"
          mkdir -p release-artifacts

          cp android/app/build/outputs/apk/release/app-release.apk "release-artifacts/Matcha-Auth-${RELEASE_TAG}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "release-artifacts/Matcha-Auth-${RELEASE_TAG}.aab"

          (cd dist && zip -r "../release-artifacts/Matcha-Auth-${RELEASE_TAG}-web.zip" .)
          find release-artifacts -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > release-artifacts/SHA256SUMS.txt

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Matcha-Auth-${{ steps.meta.outputs.release_tag }}
          path: release-artifacts/*
          if-no-files-found: error

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          name: Matcha Auth ${{ steps.meta.outputs.release_tag }}
          draft: ${{ steps.meta.outputs.draft }}
          prerelease: ${{ steps.meta.outputs.prerelease }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: release-artifacts/*
          body: |
            自动构建产物：
            - Android APK
            - Android AAB
            - Web dist zip
            - SHA256SUMS.txt
