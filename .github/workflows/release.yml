name: Release Build and Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Sync Capacitor Android Project
        run: |
          npm run build
          npx cap add android
          npx capacitor-assets generate --android
          node update-version.js
          npx cap sync

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease
          cd ..

      - name: Rename APK Asset
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk Matcha-Auth-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: Matcha-Auth-${{ github.ref_name }}.apk
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: false
          body: |
            ### Matcha Auth ${{ github.ref_name }}

            - **100% 纯离线运行**：彻底移除所有在线 CDN 依赖（`cdn.tailwindcss.com`、`fonts.googleapis.com`、`esm.sh` 导入映射等），彻底解决网络环境差时启动卡死或白屏的问题。
            - **本地化样式与字体**：引入本地 Tailwind CSS 编译，并将 `Manrope` 字体文件本地打包，保证应用在离线状态下瞬间秒开。
            - **构建系统与底层优化**：重构底层服务，移除了 Node.js `Buffer` 兼容层，采用浏览器原生 Base64 算法，显著减小应用包体积并提升启动性能。
